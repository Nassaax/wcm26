<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>World Cup Manager 26</title>

<style>
body { background:#0b0f14; color:white; font-family:Arial; text-align:center; }
#corner { position:absolute; top:10px; right:10px; font-size:12px; }
button { margin:5px; padding:10px; cursor:pointer; }

#pitch {
  width:600px;
  height:400px;
  background:green;
  margin:20px auto;
  position:relative;
}

.player {
  position:absolute;
  cursor:grab;
  font-size:12px;
}

.inactive { opacity:0.3; }

#log {
  background:#000;
  height:150px;
  overflow:auto;
  margin:10px;
  padding:10px;
}
</style>
</head>

<body>

<div id="corner">by Nassaax</div>

<h1>World Cup Manager 26</h1>

<button onclick="startMatch()">▶️ Lancer match</button>

<select onchange="speed=this.value">
<option value="1">x1</option>
<option value="2">x2</option>
<option value="4">x4</option>
<option value="0">Résultat direct</option>
</select>

<div id="score">0 - 0</div>

<div id="pitch"></div>

<div id="log"></div>

<script>

const players = [
 {name:"Mbappé", level:92},
 {name:"Bellingham", level:91},
 {name:"Vinicius", level:91},
 {name:"Messi", level:88}
];

let selected = null;

function initPitch(){
 const pitch = document.getElementById("pitch");

 pitch.addEventListener("dragover", e => e.preventDefault());

 pitch.addEventListener("drop", e => {
  if(selected){
    selected.style.left = e.offsetX+"px";
    selected.style.top = e.offsetY+"px";
  }
 });

 players.forEach(p=>{
  const el = document.createElement("div");
  el.className="player";
  el.innerText=p.name;
  el.draggable=true;

  el.onclick=()=>el.classList.toggle("inactive");

  el.addEventListener("dragstart",()=>selected=el);

  pitch.appendChild(el);
 });
}

initPitch();

let scoreA=0;
let scoreB=0;
let minute=0;
let speed=1;
let timer;

function log(text){
 const el=document.getElementById("log");
 el.innerHTML+="<div>"+text+"</div>";
 el.scrollTop=el.scrollHeight;
}

function teamPower(){
 let total=0;
 players.forEach(p=>total+=p.level);
 return total;
}

function simulate(){
 let power=teamPower();

 if(Math.random()<power/2000){
   if(Math.random()>0.5){
     scoreA++;
     log("⚽ But équipe A");
   } else {
     scoreB++;
     log("⚽ But équipe B");
   }
 }

 document.getElementById("score").innerText=scoreA+" - "+scoreB;
}

function startMatch(){

 if(speed==0){
   scoreA=Math.floor(Math.random()*4);
   scoreB=Math.floor(Math.random()*4);
   document.getElementById("score").innerText=scoreA+" - "+scoreB;
   return;
 }

 scoreA=0;
 scoreB=0;
 minute=0;

 document.getElementById("log").innerHTML="";

 clearInterval(timer);

 timer=setInterval(()=>{
   minute++;

   simulate();

   if(minute==45){
     log("⏸ Mi-temps");
   }

   if(minute>=90){
     clearInterval(timer);
     log("🏁 Fin du match");
   }

 },1000/speed);
}

</script>

</body>
</html>
